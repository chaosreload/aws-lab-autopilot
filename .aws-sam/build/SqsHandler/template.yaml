AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS Hands-on Workflow — automated technical article production pipeline.
  Orchestrates Research / Execute / Publish agents via Step Functions + SQS.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 900
    MemorySize: 256
    Environment:
      Variables:
        TASKS_TABLE: !Ref TasksTable
        RESOURCES_TABLE: !Ref ResourcesTable
        S3_BUCKET: !Ref WorkflowBucket
        STATE_MACHINE_ARN: !Ref WorkflowStateMachine

Resources:
  # ============================================================
  # API Gateway (HTTP API)
  # ============================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
        AllowHeaders:
          - Content-Type

  # ============================================================
  # Lambda Functions
  # ============================================================
  ApiHandler:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.api.handler.handler
      CodeUri: .
      Description: HTTP API handler for task CRUD operations
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ResourcesTable
        - S3CrudPolicy:
            BucketName: !Ref WorkflowBucket
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt WorkflowStateMachine.Name
      Events:
        PostTasks:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks
            Method: POST
        PostTasksBatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/batch
            Method: POST
        GetTasks:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks
            Method: GET
        GetTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}
            Method: GET
        GetTaskResult:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}/result
            Method: GET
        DeleteTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}
            Method: DELETE

  SqsHandler:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.orchestrator.sqs_handler.handler
      CodeUri: .
      Description: SQS to AgentCore bridge Lambda
      Timeout: 900
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - S3CrudPolicy:
            BucketName: !Ref WorkflowBucket
        - Statement:
            - Effect: Allow
              Action:
                - states:SendTaskSuccess
                - states:SendTaskFailure
              Resource: !Ref WorkflowStateMachine
      Events:
        ResearchQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt ResearchQueue.Arn
            BatchSize: 1
        ExecuteQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt ExecuteQueue.Arn
            BatchSize: 1
        PublishQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt PublishQueue.Arn
            BatchSize: 1

  IncrementRework:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.orchestrator.increment_rework.handler
      CodeUri: .
      Description: Increments rework_count in DynamoDB and returns current count
      Timeout: 30
      MemorySize: 128
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable

  # ============================================================
  # DynamoDB Tables
  # ============================================================
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: handson-tasks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
        - AttributeName: created_date
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: state-index
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: date-index
          KeySchema:
            - AttributeName: created_date
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ResourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: handson-resources
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: resource_arn
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
        - AttributeName: resource_arn
          KeyType: RANGE

  # ============================================================
  # S3 Bucket
  # ============================================================
  WorkflowBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub handson-workflow-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ============================================================
  # SQS Queues
  # ============================================================
  ResearchQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-research-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ResearchDLQ.Arn
        maxReceiveCount: 3

  ResearchDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-research-queue-dlq
      MessageRetentionPeriod: 1209600

  ExecuteQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-execute-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ExecuteDLQ.Arn
        maxReceiveCount: 3

  ExecuteDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-execute-queue-dlq
      MessageRetentionPeriod: 1209600

  PublishQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-publish-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PublishDLQ.Arn
        maxReceiveCount: 3

  PublishDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: handson-publish-queue-dlq
      MessageRetentionPeriod: 1209600

  # ============================================================
  # SNS Topics
  # ============================================================
  NotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: handson-workflow-notifications

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: handson-workflow-alerts

  # ============================================================
  # Step Functions State Machine
  # ============================================================
  WorkflowStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: handson-workflow
      DefinitionUri: src/orchestrator/sfn_definition.json
      DefinitionSubstitutions:
        ResearchQueueUrl: !Ref ResearchQueue
        ExecuteQueueUrl: !Ref ExecuteQueue
        PublishQueueUrl: !Ref PublishQueue
        IncrementReworkFn: !GetAtt IncrementRework.Arn
        NotifyTopic: !Ref NotificationsTopic
        AlertTopic: !Ref AlertsTopic
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ResearchQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ExecuteQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt PublishQueue.QueueName
        - LambdaInvokePolicy:
            FunctionName: !Ref IncrementRework
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource:
                - !Ref NotificationsTopic
                - !Ref AlertsTopic

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  StateMachineArn:
    Description: Step Functions State Machine ARN
    Value: !Ref WorkflowStateMachine
  TasksTableName:
    Description: DynamoDB tasks table name
    Value: !Ref TasksTable
  WorkflowBucketName:
    Description: S3 bucket name
    Value: !Ref WorkflowBucket
